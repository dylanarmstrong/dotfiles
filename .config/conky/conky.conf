conky.config = {
  background=false,
  out_to_console=true,
  out_to_x=false,
  update_interval=2,
  total_run_times=0,
  short_units=true,
  pad_percents=3,
};
conky.text = [[
,[{
    "full_text": " ❤ $acpitemp°C [$cpu%] ",
    "color": "\#DC322F"
  },
  {
    "full_text": " ≣ ${memperc}% ",
    "color": "\#B58900"
  },
  ${if_up wlp229s0}
    {
      "full_text": " ≈ ${execi 10 iw dev wlp229s0 link | sed -n '/SSID:/s/.*SSID: //p'} ",
      "color": "\#33CC99"
    },
  $endif
  {
    "full_text": " ϟ [$battery_percent%] ",
    "color": "\#9933CC"
  },
  {
    "full_text": " ♪ ${exec amixer -c 1 -M get Master | grep "Mono: Playback" | awk '{print $4}' | tr -d '[]'} ",
    "color": "\#268BD2"
  },
  {
    "full_text": " ${time %a %b %d} ${time %H:%M} "
  }
]
]];
